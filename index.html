<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رسالة لكِ عزيزتي 💌</title>

<style>
body{
font-family:Arial;
background:#fff8f6;
padding:20px;
text-align:center;
line-height:2;
}

.card{
background:white;
padding:25px;
border-radius:20px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.06);
}

button{
padding:12px;
margin:6px;
border:none;
border-radius:14px;
background:#d59494;
color:white;
font-size:15px;
cursor:pointer;
}

.section{
display:none;
margin-top:15px;
background:white;
padding:20px;
border-radius:15px;
}

.title{
font-size:32px;
color:#a35f5f;
margin-bottom:10px;
}
</style>

</head>

<body>

<div id="start" class="card">
<div class="title">رسالة لكِ عزيزتي 💌</div>
<input id="name" placeholder="اكتبي اسمكِ الكامل"><br><br>
<button onclick="startSite()">ابدئي</button>
</div>

<div id="main" style="display:none;">

<div id="intro" class="card"></div>

<button onclick="openSection('need')">ماذا يحتاج قلبكِ الآن؟ 🤍</button>
<button onclick="openSection('team')">رسالة من الطاقم الإرشادي الريادي والاستشاري 💖</button>
<button onclick="openSection('wish')">أمنية لكِ 🌷</button>

</div>

<div id="need" class="section"></div>
<div id="team" class="section"></div>
<div id="wish" class="section"></div>

<script>

let name="";

function startSite(){
name=document.getElementById("name").value || "يا غالية";
document.getElementById("start").style.display="none";
document.getElementById("main").style.display="block";

document.getElementById("intro").innerHTML=
"مرحبًا بكِ عزيزتي "+name+" 🤍<br><br>إلى القلب الذي يعطي بصمت…<br>إلى الروح التي تختار أن تحتضن رغم التعب…<br><br>نراكِ… حتى في اللحظات التي تظنين أن لا أحد ينتبه.<br>نرى صبركِ، ومحاولاتكِ، وحرصكِ الصادق في كل تفصيل صغير.<br><br>ربما لم يكن هذا الفصل سهلًا،<br>لكن وجودكِ كان فرقًا حقيقيًا 🤍";

build();
}

function openSection(id){
document.querySelectorAll('.section').forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

function build(){

document.getElementById("need").innerHTML=
"<h3>ماذا يحتاج قلبكِ الآن؟ 🤍</h3><button onclick='showNeed(0)'>هدوء 🌿</button><button onclick='showNeed(1)'>كلمة لطيفة 💬</button><button onclick='showNeed(2)'>طاقة ⚡</button><button onclick='showNeed(3)'>تقدير 🤍</button><button onclick='showNeed(4)'>تنفيس 🌸</button><p id='needResult'></p>";

document.getElementById("team").innerHTML=
"<h3>كلمة من القلب 💖</h3><p>عزيزتي "+name+" 🤍<br><br>في هذه الفترة الراهنة، ومع ما نحمله جميعًا من تحديات وضغوط ومشاعر متقلبة،يبقى عطاؤكِ حاضرًا، وصبركِ ظاهرًا، ورسالتكِ التربوية ماثلة في كل تفصيل صغير.<br><br>ربما لم يكن الطريق سهلًا،لكن وجودكِ بقي مصدر طمأنينة، وحضوركِ ظلّ يحمل الكثير من الاحتواء والدفء.<br><br>نحن نراكِ، ونقدّر ما تبذلينه من جهد، ونثمّن إخلاصكِ الكبير.<br><br>كوني فخورة بنفسكِ… فأنتِ تستحقين ذلك 🤍<br><br>لكِ منّا كل التقدير، وكل الامتنان 🤍</p>";

document.getElementById("wish").innerHTML=
"<h3>أمنية لكِ 🌷</h3><p>عزيزتي "+name+" 🤍<br><br>مع نهاية هذا الفصل، نقول لكِ شكرًا من القلب.<br><br>🌷 نتمنى لكِ عطلة ربيع سعيدة وآمنة، مليئة بالراحة والطمأنينة.<br><br>ونسأل الله أن يعمّ الأمن والأمان على بلادنا 🤍</p>";

}

function showNeed(i){
let arr=[
"خذي نفسًا عميقًا… أنتِ تستحقين الهدوء 🤍",
"أنتِ تبذلين ما يكفي… وربما أكثر 💛",
"خطوة صغيرة تكفي اليوم 🌿",
"ما تقدمينه له قيمة كبيرة 🤍",
"خففي عن قلبكِ قليلًا 🌸"
];
document.getElementById("needResult").innerHTML=arr[i];
}

</script>

</body>
</html>
