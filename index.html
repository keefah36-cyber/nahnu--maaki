<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رسالة لكِ عزيزتي 💌</title>

<style>
body{
font-family:Arial;
background:#fff8f6;
padding:20px;
text-align:center;
}

.card{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:12px;
background:#d59494;
color:white;
font-size:14px;
}

.section{
display:none;
margin-top:15px;
background:white;
padding:15px;
border-radius:15px;
}

.title{
font-size:30px;
color:#a35f5f;
}
</style>

</head>

<body>

<div id="start" class="card">
<div class="title">رسالة لكِ عزيزتي 💌</div>
<input id="name" placeholder="اكتبي اسمكِ الكامل"><br><br>
<button onclick="startSite()">ابدئي</button>
</div>

<div id="main" style="display:none;">

<div id="intro" class="card"></div>

<button onclick="openSection('need')">ماذا أحتاج الآن؟ 🤍</button>
<button onclick="openSection('words')">كلمات من القلب 💖</button>
<button onclick="openSection('end')">الخاتمة 🌙</button>

</div>

<div id="need" class="section"></div>
<div id="words" class="section"></div>
<div id="end" class="section"></div>

<script>

let name="";

function startSite(){
name=document.getElementById("name").value || "يا غالية";
document.getElementById("start").style.display="none";
document.getElementById("main").style.display="block";

document.getElementById("intro").innerHTML=
"مرحبًا بكِ عزيزتي "+name+" 🤍<br><br>نعتز بكِ وبكل ما تقدمينه من عطاء واهتمام 🌷";

build();
}

function openSection(id){
document.querySelectorAll('.section').forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

function build(){

document.getElementById("need").innerHTML=
"<h3>ماذا أحتاج الآن؟ 🤍</h3><button onclick='showNeed(0)'>هدوء 🌿</button><button onclick='showNeed(1)'>كلمة لطيفة 💬</button><button onclick='showNeed(2)'>طاقة ⚡</button><button onclick='showNeed(3)'>تقدير 🤍</button><button onclick='showNeed(4)'>تنفيس 🌸</button><p id='needResult'></p>";

document.getElementById("words").innerHTML=
"<h3>كلمات من القلب 💖</h3><button onclick='showTeam()'>رسالة من الطاقم</button><p id='wordsResult'></p>";

document.getElementById("end").innerHTML=
"<h3>الخاتمة 🌙</h3><p>عزيزتي "+name+" 🤍<br><br>نقدّر كل ما قدمتِه خلال هذا الفصل، وكل جهد بذلتِه رغم التحديات.<br><br>🌷 نتمنى لكِ عطلة ربيع سعيدة وآمنة، مليئة بالراحة والطمأنينة 🤍</p>";

}

function showNeed(i){
let arr=[
"خذي نفسًا عميقًا… أنتِ تستحقين الهدوء 🤍",
"أنتِ رائعة وتفعلين ما يكفي 💛",
"خطوة صغيرة تكفي اليوم 🌿",
"ما تقدمينه له قيمة كبيرة 🤍",
"خففي عن قلبكِ قليلًا 🌸"
];
document.getElementById("needResult").innerHTML=arr[i];
}

function showTeam(){
document.getElementById("wordsResult").innerHTML=
"نحن معكِ… نقدّر عطائكِ ووجودكِ الجميل وتأثيركِ على الأطفال 🤍";
}

</script>

</body>
</html>
