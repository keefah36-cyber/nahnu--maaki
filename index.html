<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رسالة لكِ عزيزتي 💌</title>

<style>
body{font-family:Arial;background:#fff8f6;padding:20px;text-align:center;}
.card{background:white;padding:20px;border-radius:20px;margin-bottom:15px;}
button{padding:10px;margin:5px;border:none;border-radius:12px;background:#d59494;color:white;}
.section{display:none;margin-top:15px;background:white;padding:15px;border-radius:15px;}
textarea{width:90%;height:80px;}
.title{font-size:28px;color:#a35f5f;}
</style>

</head>
<body>

<div id="start" class="card">
<div class="title">رسالة لكِ عزيزتي 💌</div>
<input id="name" placeholder="اكتبي اسمكِ الكامل"><br><br>
<button onclick="startSite()">ابدئي</button>
</div>

<div id="main" style="display:none;">

<div id="intro" class="card"></div>

<button onclick="openSection('message')">رسالة لكِ عزيزتي 💌</button>
<button onclick="openSection('strength')">مصادر قوتك 🌿</button>
<button onclick="openSection('heart')">ماذا يحتاج قلبك الآن 🤍</button>
<button onclick="openSection('release')">ركن التنفيس 🌸</button>
<button onclick="openSection('strengths')">نقاط القوة ✨</button>
<button onclick="openSection('light')">كيف أخفف عن نفسي 🌷</button>
<button onclick="openSection('gratitude')">أنا ممتنة لنفسي 🤍</button>
<button onclick="openSection('words')">كلمات من القلب 💖</button>
<button onclick="openSection('wish')">أمنية 🌙</button>

</div>

<div id="message" class="section"></div>
<div id="strength" class="section"></div>
<div id="heart" class="section"></div>
<div id="release" class="section"></div>
<div id="strengths" class="section"></div>
<div id="light" class="section"></div>
<div id="gratitude" class="section"></div>
<div id="words" class="section"></div>
<div id="wish" class="section"></div>

<script>

let name="";

function startSite(){
name=document.getElementById("name").value || "يا غالية";
document.getElementById("start").style.display="none";
document.getElementById("main").style.display="block";

document.getElementById("intro").innerHTML=
"مرحبًا بكِ عزيزتي "+name+" 🤍<br><br>أنتِ أثر جميل وعطاء لا ينتهي 🌷";

build();
}

function openSection(id){
document.querySelectorAll('.section').forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

function build(){

document.getElementById("message").innerHTML=
"<h3>رسالة لكِ عزيزتي 💌</h3><p>يا "+name+" أنتِ مميزة وعطاؤكِ لا يُقدّر بثمن 🤍</p>";

document.getElementById("strength").innerHTML=
"<h3>مصادر قوتك 🌿</h3><p>العقل، القيم، الدعم، المعنى، الخيال</p>";

document.getElementById("heart").innerHTML=
"<h3>ماذا يحتاج قلبك الآن 🤍</h3><p>هدوء، كلمة لطيفة، طاقة</p>";

document.getElementById("release").innerHTML=
"<h3>ركن التنفيس 🌸</h3><p>خذي شهيق عميق... زفير ببطء</p><textarea placeholder='اكتبي ما بداخلك'></textarea>";

document.getElementById("strengths").innerHTML=
"<h3>نقاط القوة ✨</h3><p>روح المبادرة، الاحتواء، الشجاعة</p>";

document.getElementById("light").innerHTML=
"<h3>كيف أخفف عن نفسي 🌷</h3><p>خذي استراحة، سامحي نفسك، ابتسمي</p>";

document.getElementById("gratitude").innerHTML=
"<h3>أنا ممتنة لنفسي 🤍</h3><p>أنا ممتنة لنهاية اليوم بسلام</p>";

document.getElementById("words").innerHTML=
"<h3>كلمات من القلب 💖</h3><button onclick='alert("رسالة من المفتشة خولة ريان يا "+name+"")'>رسالة المفتشة</button><button onclick='alert("رسالة من الطاقم الإرشادي يا "+name+"")'>رسالة الطاقم</button>";

document.getElementById("wish").innerHTML=
"<h3>أمنية 🌙</h3><p>نتمنى لكِ ولعائلتك عطلة آمنة وسعيدة 🤍</p>";

}

</script>

</body>
</html>
